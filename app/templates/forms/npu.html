{% extends "dashboard.html" %}
{% block title %}NPU — StockIQ{% endblock %}
{% block page_title %}♻️ Non-Productive Usage{% endblock %}

{% block content %}
<div class="form-page fade-in">
  <div class="form-card">
    <h2>♻️ Form NPU (Wastage)</h2>

    <form method="POST" action="{{ url_for('npu.index') }}" class="validated-form"
          data-item-type="npu">

      <div class="form-group">
        <label for="tanggal">Tanggal</label>
        <input type="date" id="tanggal" name="tanggal" class="form-control" required>
      </div>

      <div class="form-group">
        <label for="search_bahan">Cari Bahan</label>
        <input type="text" id="search_bahan" class="form-control search-input"
               placeholder="🔍 Ketik untuk mencari bahan...">
      </div>

      <div class="form-group">
        <label for="nama_bahan">Item NPU</label>
        <select id="nama_bahan" name="nama_bahan" class="form-control" required>
          <option value="">-- Memuat... --</option>
        </select>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="divisi">Divisi</label>
          <input type="text" id="divisi" name="divisi" class="form-control" placeholder="Otomatis" readonly>
        </div>
        <div class="form-group">
          <label for="satuan">Satuan</label>
          <input type="text" id="satuan" name="satuan" class="form-control" placeholder="Otomatis" readonly>
        </div>
      </div>

      <div class="form-group">
        <label for="qty">Qty NPU</label>
        <input type="number" id="qty" name="qty" class="form-control"
               placeholder="0" min="0.01" step="any" required>
      </div>

      <div class="form-group">
        <label for="keterangan">Keterangan <span class="optional-label">(opsional)</span></label>
        <textarea id="keterangan" name="keterangan" class="form-control"
                  placeholder="Justifikasi audit: alasan NPU, detail kejadian, dll."></textarea>
      </div>

      <div style="display:flex;gap:12px;margin-top:8px;">
        <button type="submit" class="btn btn-primary" id="submitNpu">💾 Simpan</button>
        <a href="{{ url_for('dashboard.index') }}" class="btn btn-ghost">Batal</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
