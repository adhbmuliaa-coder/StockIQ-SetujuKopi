{% extends "dashboard.html" %}
{% block title %}Prepare — StockIQ{% endblock %}
{% block page_title %}🍳 Prepare{% endblock %}

{% block content %}
<div class="form-page fade-in">
  <div class="form-card">
    <h2>🍳 Form Prepare (Produksi)</h2>

    <form method="POST" action="{{ url_for('prepare.index') }}" class="validated-form" id="prepareForm"
          data-item-type="prepare">

      <div class="form-group">
        <label for="tanggal">Tanggal</label>
        <input type="date" id="tanggal" name="tanggal" class="form-control" required>
      </div>

      <div class="form-group">
        <label for="search_bahan">Cari Bahan</label>
        <input type="text" id="search_bahan" class="form-control search-input"
               placeholder="🔍 Ketik untuk mencari bahan...">
      </div>

      <div class="form-group">
        <label for="nama_bahan">Prepare Bahan</label>
        <select id="nama_bahan" name="nama_bahan" class="form-control" required>
          <option value="">-- Memuat... --</option>
        </select>
      </div>

      <div class="form-group">
        <label for="divisi">Divisi</label>
        <input type="text" id="divisi" name="divisi" class="form-control" placeholder="Otomatis" readonly>
      </div>

      <div class="form-section-label">📦 Input Prepare</div>
      <div class="form-row">
        <div class="form-group">
          <label for="qty_prepare">Qty Prepare</label>
          <input type="number" id="qty_prepare" name="qty_prepare" class="form-control"
                 placeholder="0" min="0" step="any" required>
        </div>
        <div class="form-group">
          <label for="satuan_prepare">Satuan Prepare</label>
          <input type="text" id="satuan_prepare" name="satuan_prepare" class="form-control" placeholder="Otomatis" readonly>
        </div>
      </div>

      <div class="form-section-label">✅ Hasil Jadi</div>
      <div class="form-row">
        <div class="form-group">
          <label for="qty_jadi">Qty Jadi</label>
          <input type="number" id="qty_jadi" name="qty_jadi" class="form-control"
                 placeholder="0" min="0" step="any" required>
        </div>
        <div class="form-group">
          <label for="satuan_bahan">Satuan Bahan</label>
          <input type="text" id="satuan_bahan" name="satuan_bahan" class="form-control" placeholder="Otomatis" readonly>
        </div>
      </div>

      <div class="form-group">
        <label for="keterangan">Keterangan <span class="optional-label">(opsional)</span></label>
        <textarea id="keterangan" name="keterangan" class="form-control"
                  placeholder="Contoh: Prepare shift pagi, batch ke-2"></textarea>
      </div>

      <div style="display:flex;gap:12px;margin-top:8px;">
        <button type="submit" class="btn btn-primary" id="submitPrepare">💾 Simpan</button>
        <a href="{{ url_for('dashboard.index') }}" class="btn btn-ghost">Batal</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
