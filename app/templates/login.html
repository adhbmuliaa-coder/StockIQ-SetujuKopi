{% extends "base.html" %}
{% block title %}Login — StockIQ{% endblock %}

{% block body %}
<div class="login-wrapper">
  <div class="login-card fade-in">
    <div class="brand">
      <img src="{{ url_for('static', filename='img/logo_app.png') }}" alt="StockIQ" class="login-logo">
      <p>Setuju Kopi — Inventory Logger</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" class="form-control"
               placeholder="Masukkan username" required autofocus>
      </div>

      <div class="form-group">
        <label for="password">Passkey</label>
        <input type="password" id="password" name="password" class="form-control"
               placeholder="Masukkan passkey" required>
      </div>

      <button type="submit" class="btn btn-primary btn-block" id="loginBtn">
        🔐 Login
      </button>
    </form>
  </div>
</div>
{% endblock %}
